		<script>
			// Flip off js-pending immediately so the loading screen can own the first paint
			// without a flash of unstyled/incorrect state.
			document.documentElement.classList.remove('js-pending');
			document.documentElement.classList.add('js-ready');
			if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
				document.documentElement.classList.add('reduce-motion');
			}
		</script>

	<body data-sveltekit-preload-data="hover" class="bg-void text-ink antialiased">
